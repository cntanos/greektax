name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Run pytest
        run: pytest
      - name: Run ruff
        run: ruff check src tests
      - name: Run mypy
        run: mypy src
      - name: Run dead-code check (vulture)
        run: vulture src tests --min-confidence 100 --ignore-names cls,__context,package
      - name: Run frontend static checks
        run: node --test tests/frontend
      - name: Check bundle-size budgets
        run: python scripts/check_bundle_size.py
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt -r requirements-dev.txt
      - name: Report outdated dependencies
        run: pip list --outdated
      - name: Check requirements sync
        run: python scripts/sync_requirements.py --check
      - name: Validate YAML configs
        run: python -m greektax.backend.config.validator
