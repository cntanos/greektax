name: Deploy backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
      PYTHONANYWHERE_VENV: ${{ secrets.PYTHONANYWHERE_VENV }}
      PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
      PYTHONANYWHERE_WEBAPP: ${{ secrets.PYTHONANYWHERE_WEBAPP }}
      PYTHONANYWHERE_APP_DIR: /home/${{ secrets.PYTHONANYWHERE_USERNAME }}/greektax
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
      - name: Validate deployment secrets
        env:
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          PYTHONANYWHERE_VENV: ${{ secrets.PYTHONANYWHERE_VENV }}
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_WEBAPP: ${{ secrets.PYTHONANYWHERE_WEBAPP }}
          PYTHONANYWHERE_SSH_KEY: ${{ secrets.PYTHONANYWHERE_SSH_KEY }}
        run: |
          set -euo pipefail

          missing=0
          for var in \
            PYTHONANYWHERE_USERNAME \
            PYTHONANYWHERE_VENV \
            PYTHONANYWHERE_API_TOKEN \
            PYTHONANYWHERE_WEBAPP \
            PYTHONANYWHERE_SSH_KEY
          do
            if [ -z "${!var}" ]; then
              echo "::error::${var} is empty; update the repository secret before deploying."
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          temp_key="$(mktemp)"
          trap 'rm -f "${temp_key}"' EXIT
          printf '%s\n' "${PYTHONANYWHERE_SSH_KEY}" | tr -d '\r' > "${temp_key}"
          chmod 600 "${temp_key}"

          if ! ssh-keygen -lf "${temp_key}" >/dev/null 2>&1; then
            echo "::error::PYTHONANYWHERE_SSH_KEY is not a valid SSH private key."
            exit 1
          fi
      - name: Push code to PythonAnywhere
        uses: appleboy/ssh-action@334f9259f2f8eb3376d33fa4c684fff373f2c2a6  # v0.1.10
        with:
          host: ssh.pythonanywhere.com
          username: ${{ env.PYTHONANYWHERE_USERNAME }}
          key: ${{ secrets.PYTHONANYWHERE_SSH_KEY }}
          envs: |
            PYTHONANYWHERE_USERNAME=${{ env.PYTHONANYWHERE_USERNAME }}
            PYTHONANYWHERE_APP_DIR=${{ env.PYTHONANYWHERE_APP_DIR }}
            PYTHONANYWHERE_VENV=${{ env.PYTHONANYWHERE_VENV }}
            PYTHONANYWHERE_API_TOKEN=${{ env.PYTHONANYWHERE_API_TOKEN }}
            PYTHONANYWHERE_WEBAPP=${{ env.PYTHONANYWHERE_WEBAPP }}
          script: |
            set -euo pipefail
            ~/update_greektax.sh
      - name: Reload web app
        run: |
          curl -fsS -X POST \
            -H "Authorization: Token ${PYTHONANYWHERE_API_TOKEN}" \
            https://www.pythonanywhere.com/api/v0/user/${PYTHONANYWHERE_USERNAME}/webapps/${PYTHONANYWHERE_WEBAPP}/reload/
