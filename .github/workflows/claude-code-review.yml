name: Claude PR Review

# Runs Claude (via anthropics/claude-code-action) against every PR opened
# or updated, posting a single review comment. No @claude mention needed —
# the action infers PR context from the trigger.
#
# Setup requirements (see PR description):
#   1. Install the Claude GitHub App on this repository.
#   2. Mint a CLAUDE_CODE_OAUTH_TOKEN (`claude setup-token` locally) so the
#      action runs against your Claude.ai Max subscription quota instead of
#      pay-as-you-go API billing. Add it as a repository secret.
#   3. (Optional) Disable the previous AI reviewer (OpenAI Codex) at
#      https://chatgpt.com/codex/cloud/settings/general.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  # OIDC token used by the action for the GitHub-side commenting flow.
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts so we only spend tokens on PRs that are ready for review.
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          # Full history so Claude can inspect base...head diffs accurately.
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@f4fb5c6cdccc1ee7af63692f5d08d56efaa64cc8  # v1 (2026-05-12)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use Opus 4.7 instead of the action's default Sonnet 4.6 — stronger
          # reasoning on regression-prone areas like the Pydantic models and
          # the Sankey rendering path. Cost is charged to Max quota only.
          claude_args: --model claude-opus-4-7
          # Surface Claude's reasoning in the workflow log so we can diagnose
          # quality issues without re-running.
          show_full_output: true
          prompt: |
            Review this pull request against the GreekTax repository
            following the conventions and priorities documented in
            `CLAUDE.md` (loaded automatically by the action from the
            base branch). Be terse and actionable. File inline review
            comments anchored to specific file:line locations using
            the tag scheme described there ([bug] / [security] /
            [perf] / [test] / [nit]). File no comments if nothing in
            the diff warrants one.
